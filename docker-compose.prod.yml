version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: vibe-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vibeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vibecommunity}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibeuser} -d ${POSTGRES_DB:-vibecommunity}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Next.js App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-app-prod
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vibeuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vibecommunity}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://vibecodingcommunity.ir}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - SMSIR_API_KEY=${SMSIR_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    # User-uploaded files (avatars, project images) must survive recreates.
    # Bind-mounted to the host so nginx can serve /uploads/* directly (Next's
    # standalone server caches the public listing at startup and won't serve
    # files written after boot).
    volumes:
      - ./uploads:/app/public/uploads
    networks:
      - internal
    # Published on loopback so the host nginx (vibecodingcommunity.ir) can
    # proxy_pass to 127.0.0.1:3000.
    ports:
      - "127.0.0.1:3000:3000"
    expose:
      - "3000"

  # Caddy Reverse Proxy with Automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: vibe-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
      - external

  # Multi-domain support for future projects
  # Add new services here and update Caddyfile for routing
  # Example:
  # app2:
  #   build: ./path/to/project2
  #   restart: unless-stopped
  #   networks:
  #     - internal
  #   expose:
  #     - "3001"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
  external:
