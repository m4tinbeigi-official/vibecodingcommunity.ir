version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: vibe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vibeuser
      POSTGRES_PASSWORD: vibepass
      POSTGRES_DB: vibecommunity
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeuser -d vibecommunity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://vibeuser:vibepass@db:5432/vibecommunity
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=change-this-to-a-random-secret
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public:/app/public

volumes:
  postgres_data:
